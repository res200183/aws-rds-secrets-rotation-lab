AWSTemplateFormatVersion: '2010-09-09'
Description: RDS MySQL + Secrets Manager + rotation lab

Resources:
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: rds-mysql-admin-secret
      Description: Admin credentials for RDS MySQL
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: password
        PasswordLength: 20
        ExcludeCharacters: '"@/\'

  MyDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: my-rotation-lab-db
      Engine: mysql
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      MultiAZ: false

  RotationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: rds-secret-rotation
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: arn:aws:iam::123456789012:role/lambda-basic-role
      Timeout: 30
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return "Rotation placeholder"

  SecretRotation:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref DBSecret
      RotationLambdaARN: !GetAtt RotationLambda.Arn
      RotationRules:
        AutomaticallyAfterDays: 90
